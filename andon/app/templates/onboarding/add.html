{% extends "base.html" %}
{% block title %}Add a Contact — TLG Andon{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-50 px-4 py-8">
  <div class="max-w-lg w-full">

    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-8">

      <h1 class="text-2xl font-bold text-gray-900">Add a Contact</h1>
      <p class="text-gray-500 mt-1 mb-6">Manually add a subcontractor to your contact list.</p>

      {% if error %}
      <div class="mb-4 px-4 py-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">{{ error }}</div>
      {% endif %}

      <form method="post" action="/onboarding/add" class="space-y-4">

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-gray-700 mb-1">Name *</label>
            <input type="text" name="name" required class="w-full px-3 py-2 text-sm border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-700 mb-1">Company</label>
            <input type="text" name="company" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500">
          </div>
        </div>

        <div>
          <label class="block text-xs font-medium text-gray-700 mb-1">Trade</label>
          <select name="trade" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500">
            <option value="">— Select trade —</option>
            {% for key, label in trades.items() %}
            <option value="{{ key }}">{{ label }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-gray-700 mb-1">Phone</label>
            <input type="text" name="phone" placeholder="+19205551234" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-700 mb-1">Email</label>
            <input type="email" name="email" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500">
          </div>
        </div>

        <div>
          <label class="block text-xs font-medium text-gray-700 mb-1">Manager Phone</label>
          <input type="text" name="manager_phone" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
          <label class="block text-xs font-medium text-gray-700 mb-1">Notes</label>
          <textarea name="notes" rows="2" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500"></textarea>
        </div>

        <div class="flex gap-3 pt-2">
          <a href="/onboarding" class="flex-1 px-4 py-3 text-center text-sm text-gray-700 font-medium bg-gray-100 rounded-xl hover:bg-gray-200 transition">Back</a>
          <button type="submit" class="flex-1 px-4 py-3 text-sm text-white font-medium bg-blue-600 rounded-xl hover:bg-blue-700 transition shadow-sm">Save Contact</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
