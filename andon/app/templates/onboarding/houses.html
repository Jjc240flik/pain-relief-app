{% extends "base.html" %}
{% block title %}Add Houses — TLG Andon{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-50 px-4 py-8">
  <div class="max-w-xl w-full">

    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-8">

      <!-- Progress -->
      <div class="flex items-center gap-2 mb-6 text-sm">
        <span class="w-8 h-8 bg-blue-600 text-white rounded-full flex items-center justify-center font-bold">✓</span>
        <span class="text-gray-400">—</span>
        <span class="w-8 h-8 bg-blue-600 text-white rounded-full flex items-center justify-center font-bold">2</span>
        <span class="text-gray-400">—</span>
        <span class="w-8 h-8 bg-gray-200 text-gray-500 rounded-full flex items-center justify-center font-bold">3</span>
      </div>

      <h1 class="text-2xl font-bold text-gray-900">Add Your Houses</h1>
      <p class="text-gray-500 mt-1 mb-6">Add the addresses of the houses or projects you're building.</p>

      <form method="post" action="/onboarding/houses" id="houses-form">
        <div id="houses-list" class="space-y-3">
          <div class="house-entry flex items-start gap-2">
            <div class="flex-1">
              <label class="block text-xs font-medium text-gray-700 mb-1">Address</label>
              <input type="text" name="address" placeholder="e.g. 123 Main St" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500" required>
            </div>
            <div class="w-1/3">
              <label class="block text-xs font-medium text-gray-700 mb-1">City</label>
              <input type="text" name="city" placeholder="City" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="button" onclick="this.closest('.house-entry').remove()" class="mt-6 text-gray-400 hover:text-red-500 transition shrink-0" title="Remove">✕</button>
          </div>
        </div>

        <button type="button" onclick="addHouseRow()"
                class="mt-3 w-full px-4 py-2 text-sm text-blue-600 font-medium bg-blue-50 border border-dashed border-blue-200 rounded-xl hover:bg-blue-100 transition">
          + Add Another House
        </button>

        <div class="flex gap-3 mt-6">
          <a href="/onboarding" class="flex-1 px-4 py-3 text-center text-sm text-gray-700 font-medium bg-gray-100 rounded-xl hover:bg-gray-200 transition">Back</a>
          <button type="submit" class="flex-1 px-4 py-3 text-sm text-white font-medium bg-blue-600 rounded-xl hover:bg-blue-700 transition shadow-sm">
            Save & Continue →
          </button>
        </div>
      </form>

      <div class="mt-4 text-center">
        <a href="/onboarding/contacts" class="text-sm text-gray-400 hover:text-gray-600">Skip this step →</a>
      </div>

    </div>
  </div>
</div>

<script>
function addHouseRow() {
  var list = document.getElementById('houses-list');
  var entry = document.createElement('div');
  entry.className = 'house-entry flex items-start gap-2';
  entry.innerHTML = `
    <div class="flex-1">
      <label class="block text-xs font-medium text-gray-700 mb-1">Address</label>
      <input type="text" name="address" placeholder="e.g. 123 Main St" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500">
    </div>
    <div class="w-1/3">
      <label class="block text-xs font-medium text-gray-700 mb-1">City</label>
      <input type="text" name="city" placeholder="City" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500">
    </div>
    <button type="button" onclick="this.closest('.house-entry').remove()" class="mt-6 text-gray-400 hover:text-red-500 transition shrink-0" title="Remove">✕</button>
  `;
  list.appendChild(entry);
  // Focus the new address field
  entry.querySelector('input[name="address"]').focus();
}
</script>
{% endblock %}
