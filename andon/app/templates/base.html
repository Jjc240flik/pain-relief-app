<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TLG Andon{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/ext/json-enc.js"></script>
    <style>
        /* Minimal custom overrides — everything else is Tailwind */
        .fade-out.htmx-swapping {
            opacity: 0;
            transition: opacity 0.3s ease-out;
        }
        .row-pulse.htmx-request {
            opacity: 0.6;
            transition: opacity 0.2s;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-900 antialiased">
    {% block content %}{% endblock %}
</body>
</html>
