{% extends "base.html" %}
{% block title %}Login — TLG Andon{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-50 px-4">
  <div class="max-w-sm w-full">

    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-8 text-center">

      <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
        <span class="text-white text-2xl font-bold">TLG</span>
      </div>

      <h1 class="text-xl font-bold text-gray-900 mb-1">TLG Andon</h1>
      <p class="text-sm text-gray-500 mb-6">Sign in to your account</p>

      {% if error %}
      <div class="mb-4 px-4 py-2 bg-red-50 border border-red-200 rounded-lg text-sm text-red-600 text-left">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/auth/login" class="space-y-4">
        <div class="text-left">
          <label class="block text-xs font-medium text-gray-700 mb-1">Username</label>
          <input type="text" name="username" required autocomplete="username"
                 class="w-full px-3 py-2.5 text-sm border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
        </div>
        <div class="text-left">
          <label class="block text-xs font-medium text-gray-700 mb-1">Password</label>
          <input type="password" name="password" required autocomplete="current-password"
                 class="w-full px-3 py-2.5 text-sm border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
        </div>
        <button type="submit"
                class="w-full py-2.5 text-sm font-medium text-white bg-blue-600 rounded-xl hover:bg-blue-700 transition shadow-sm">
          Sign In
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
