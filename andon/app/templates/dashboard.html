{% extends "base.html" %}

{% block title %}TLG Andon — Daily View{% endblock %}

{% block content %}

<!-- ── HEADER ── appears exactly once ── -->
<header class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-10">
  <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <h1 class="text-xl font-bold text-gray-900">TLG <span class="text-blue-600">Andon</span></h1>
      <span class="hidden sm:inline text-sm text-gray-400">|</span>
      <span class="hidden sm:inline text-sm text-gray-500">{{ today }}</span>
    </div>
    <div class="flex items-center gap-3">
      <!-- Red count -->
      <span id="badge-red"
            class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-sm font-semibold
                   {% if red_count > 0 %}bg-red-100 text-red-700{% else %}bg-gray-100 text-gray-400{% endif %}">
        <span class="w-2 h-2 rounded-full {% if red_count > 0 %}bg-red-500{% else %}bg-gray-300{% endif %}"></span>
        {{ red_count }} Red
      </span>
      <!-- Yellow count -->
      <span id="badge-yellow"
            class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-sm font-semibold
                   {% if yellow_count > 0 %}bg-yellow-100 text-yellow-700{% else %}bg-gray-100 text-gray-400{% endif %}">
        <span class="w-2 h-2 rounded-full {% if yellow_count > 0 %}bg-yellow-400{% else %}bg-gray-300{% endif %}"></span>
        {{ yellow_count }} Yellow
      </span>
      <!-- Refresh -->
      <button hx-get="/dashboard/partial"
              hx-target="#house-list"
              hx-indicator="#refresh-spin"
              class="p-2 rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition"
              title="Refresh">
        <svg id="refresh-spin" class="w-5 h-5 htmx-indicator animate-spin hidden" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<!-- ── MAIN CONTENT ── -->
<main class="max-w-3xl mx-auto px-4 py-6">
  <div id="house-list" class="space-y-3">
    {% include "partials/house_rows.html" %}
  </div>
</main>

<!-- ── DATE PICKER MODAL ── -->
<div id="date-modal" class="fixed inset-0 z-20 hidden bg-black/30 flex items-center justify-center"
     onclick="event.target===this&&closeDatePicker()">
  <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-sm mx-4" onclick="event.stopPropagation()">
    <h3 class="font-semibold text-lg mb-3">Change Scheduled Date</h3>
    <form hx-post="/dashboard/{{ item_id }}/push-custom"
          hx-target="#house-list"
          hx-swap="outerHTML"
          onsubmit="closeDatePicker()">
      <input type="hidden" name="item_id" id="modal-item-id">
      <label class="block text-sm font-medium text-gray-700 mb-1">New start date</label>
      <input type="date" name="new_start_date" required
             class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
      <div class="flex justify-end gap-2 mt-4">
        <button type="button" onclick="closeDatePicker()"
                class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">Cancel</button>
        <button type="submit"
                class="px-4 py-2 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700">Update</button>
      </div>
    </form>
  </div>
</div>

<!-- ── PHOTO GALLERY MODAL ── -->
<div id="gallery-modal" class="fixed inset-0 z-30 hidden bg-black/80 flex items-center justify-center"
     onclick="event.target===this&&closeGallery()">
  <div class="relative max-w-3xl mx-4 w-full" onclick="event.stopPropagation()">
    <button onclick="closeGallery()"
            class="absolute -top-10 right-0 text-white text-sm hover:text-gray-300 z-10">✕ Close</button>
    <div id="gallery-content" class="flex flex-col items-center gap-4">
      <img id="gallery-img" class="max-w-full max-h-[80vh] rounded-lg shadow-2xl" style="display:none">
      <p id="gallery-loading" class="text-white text-sm">Loading...</p>
    </div>
    <div id="gallery-position" class="text-white text-sm text-center mt-2"></div>
    <div id="gallery-nav" class="flex justify-center gap-4 mt-2" style="display:none">
      <button onclick="galleryPrev()" class="px-4 py-2 bg-white/20 text-white rounded-lg hover:bg-white/30">← Prev</button>
      <button onclick="galleryNext()" class="px-4 py-2 bg-white/20 text-white rounded-lg hover:bg-white/30">Next →</button>
    </div>
  </div>
</div>

<!-- ── VIDEO MODAL ── -->
<div id="video-modal" class="fixed inset-0 z-30 hidden bg-black/80 flex items-center justify-center"
     onclick="event.target===this&&closeVideo()">
  <div class="relative max-w-3xl mx-4 w-full" onclick="event.stopPropagation()">
    <button onclick="closeVideo()"
            class="absolute -top-10 right-0 text-white text-sm hover:text-gray-300 z-10">✕ Close</button>
    <video id="video-player" class="w-full max-h-[80vh] rounded-lg shadow-2xl" controls style="display:none"></video>
    <p id="video-loading" class="text-white text-sm text-center py-8">Loading video...</p>
  </div>
</div>

<script>
function openDatePicker(itemId) {
  document.getElementById('modal-item-id').value = itemId;
  document.getElementById('date-modal').classList.remove('hidden');
}
function closeDatePicker() {
  document.getElementById('date-modal').classList.add('hidden');
}

// Dropdown toggle for Call button
function toggleDropdown(event, id) {
  event.stopPropagation();
  var dd = document.getElementById(id);
  if (!dd) return;
  var isOpen = !dd.classList.contains('hidden');
  // Close all other dropdowns
  document.querySelectorAll('.contact-dropdown > div:not(.hidden)').forEach(function(d) {
    d.classList.add('hidden');
  });
  if (!isOpen) {
    dd.classList.remove('hidden');
  }
}

// Close dropdowns on outside click
document.addEventListener('click', function() {
  document.querySelectorAll('.contact-dropdown > div:not(.hidden)').forEach(function(d) {
    d.classList.add('hidden');
  });
});

// Auto-refresh every 60s
setInterval(function() {
  htmx.ajax('GET','/dashboard/partial',{target:'#house-list',swap:'outerHTML'});
}, 60000);

// ── Media gallery state ──
var galleryItems = [];
var galleryIndex = 0;

function openGallery(itemId) {
  var row = document.getElementById('row-' + itemId);
  if (!row) { console.warn('Gallery: no row', itemId); return; }
  var btn = row.querySelector('.photo-gallery-btn');
  if (!btn) { console.warn('Gallery: no btn in', itemId); return; }
  
  var raw = btn.getAttribute('data-media');
  if (!raw || raw === '[]') { console.warn('Gallery: no data'); return; }
  
  try {
    var all = JSON.parse(raw);
    galleryItems = all.filter(function(m) { return m.category === 'photo' && m.url; });
  } catch(e) {
    console.warn('Gallery: JSON parse failed', e);
    return;
  }
  
  if (galleryItems.length === 0) { console.warn('Gallery: no photos'); return; }
  
  galleryIndex = 0;
  // Show loading, hide nav
  document.getElementById('gallery-loading').style.display = '';
  document.getElementById('gallery-img').style.display = 'none';
  document.getElementById('gallery-nav').style.display = 'none';
  document.getElementById('gallery-position').textContent = '';
  
  showGalleryImage();
  document.getElementById('gallery-modal').style.display = 'flex';
}

function showGalleryImage() {
  var img = document.getElementById('gallery-img');
  var pos = document.getElementById('gallery-position');
  var nav = document.getElementById('gallery-nav');
  var loading = document.getElementById('gallery-loading');
  
  var item = galleryItems[galleryIndex];
  if (!item) return;
  
  // Set src — when it loads, hide loading and show image
  img.onload = function() {
    loading.style.display = 'none';
    img.style.display = '';
  };
  img.onerror = function() {
    loading.textContent = 'Failed to load image';
  };
  img.src = item.url;
  
  // Position + nav
  if (galleryItems.length > 1) {
    pos.textContent = (galleryIndex + 1) + ' of ' + galleryItems.length;
    nav.style.display = 'flex';
  } else {
    pos.textContent = '';
    nav.style.display = 'none';
  }
}

function galleryNext() {
  if (galleryIndex < galleryItems.length - 1) {
    galleryIndex++;
    // Reset to loading state
    document.getElementById('gallery-loading').style.display = '';
    document.getElementById('gallery-img').style.display = 'none';
    showGalleryImage();
  }
}

function galleryPrev() {
  if (galleryIndex > 0) {
    galleryIndex--;
    document.getElementById('gallery-loading').style.display = '';
    document.getElementById('gallery-img').style.display = 'none';
    showGalleryImage();
  }
}

function closeGallery() {
  document.getElementById('gallery-modal').style.display = 'none';
  document.getElementById('gallery-img').style.display = 'none';
  document.getElementById('gallery-loading').style.display = '';
  galleryItems = [];
}

function openVideo(itemId) {
  var row = document.getElementById('row-' + itemId);
  if (!row) { console.warn('Video: no row'); return; }
  var btn = row.querySelector('.video-btn');
  if (!btn) { console.warn('Video: no btn'); return; }
  
  var raw = btn.getAttribute('data-media');
  if (!raw || raw === '[]') { console.warn('Video: no data'); return; }
  
  try {
    var all = JSON.parse(raw);
    var videoItem = null;
    for (var i = 0; i < all.length; i++) {
      if (all[i].category === 'video' && all[i].url) {
        videoItem = all[i];
        break;
      }
    }
  } catch(e) {
    console.warn('Video: JSON parse failed', e);
    return;
  }
  
  if (!videoItem) { console.warn('Video: no video found'); return; }
  
  // Show loading, then load video
  document.getElementById('video-loading').style.display = '';
  document.getElementById('video-player').style.display = 'none';
  
  var player = document.getElementById('video-player');
  player.src = videoItem.url;
  player.oncanplay = function() {
    document.getElementById('video-loading').style.display = 'none';
    player.style.display = '';
  };
  player.onerror = function() {
    document.getElementById('video-loading').textContent = 'Failed to load video';
  };
  player.load();
  
  document.getElementById('video-modal').style.display = 'flex';
  player.play().catch(function(e) {
    console.warn('Video autoplay blocked (expected on mobile):', e);
  });
}

function closeVideo() {
  var player = document.getElementById('video-player');
  player.pause();
  player.src = '';
  player.style.display = 'none';
  document.getElementById('video-loading').style.display = '';
  document.getElementById('video-loading').textContent = 'Loading video...';
  document.getElementById('video-modal').style.display = 'none';
}

// ── Classification feedback ──
function classifyFeedback(itemId, feedback) {
  // Find the latest event for this schedule item
  // For MVP, we log a simple confirmation to the server
  fetch('/dashboard/' + itemId + '/escalate', { method: 'POST' })
    .then(function(r) { return r.text(); })
    .then(function(html) {
      htmx.ajax('GET','/dashboard/partial',{target:'#house-list',swap:'outerHTML'});
    });
  // Show a quick visual confirmation
  var btn = document.querySelector('[onclick*="classifyFeedback(\'' + itemId + '\', \'correct\')"]');
  if (btn) btn.textContent = '✓';
}

function showCorrectionPicker(itemId, lastMessage) {
  var currentStatus = prompt('Enter the CORRECT status for this issue:\nR = Red (blocked, urgent)\nY = Yellow (at risk, monitoring)\nG = Green (resolved, on track)\n\nLeave blank to cancel.');
  if (!currentStatus) return;
  currentStatus = currentStatus.toUpperCase().trim();
  if (!['R','Y','G'].includes(currentStatus)) {
    alert('Please enter R, Y, or G.');
    return;
  }
  // Send correction to the feedback endpoint
  // We use the last event for this schedule item (via the dashboard route)
  var form = new FormData();
  form.append('correct_status', currentStatus);
  fetch('/dashboard/' + itemId + '/resolve', { method: 'POST', body: form })
    .then(function() {
      htmx.ajax('GET','/dashboard/partial',{target:'#house-list',swap:'outerHTML'});
    });
}
</script>

{% endblock %}
